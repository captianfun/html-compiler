<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Live Previewer</title>
        <style>
            body {
                background-color:deepskyblue;
                display:flex;
            }
            
            #comp {
                width:50%;
                height:100vh;
                resize:none;
                margin-right:10px;
                font-family:sans-serif;
            }
            
            #out {
                width:50%;
                background-color:white;
                border:1px solid gray;
                margin-top:1px;
                border-radius:2px;
                padding:2px;
            }
        </style>
    </head>
    <body>
        <textarea id="comp" placeholder="enter your code here"><!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>My Project</title>
    </head>
    <body>
    
    
    </body>
</html></textarea>
        <iframe id = "out"></iframe>
        <script>
            var out = document.getElementById("out");
            var comp = document.getElementById("comp");
            
            var update = function() {
                out.innerHTML = comp.value;
                var links = out.getElementsByTagName("a");
                for (var i = 0; i < links.length; i++) {
                    links[i].setAttribute("target", "_blank");
                }
            }
            
            var handleAutoClose = function(event) {
                if (event.data === ">") {
                    var cursorPos = comp.selectionStart;
                    var text = comp.value;
                    var openBracket = text.lastIndexOf("<", cursorPos - 1);
                    if (openBracket !== -1) {
                        var tagContent = text.substring(openBracket + 1, cursorPos - 1).trim();
                        var tagName = tagContent.split(" ")[0];
                        if (tagName && !tagName.startsWith("/") && !tagName.endsWith("/")) {
                            var voidTags = [
                                "!doctype",
                                "img",
                                "meta",
                                "link",
                                "br",
                                "hr",
                                "input",
                            ];
                            if (voidTags.includes(tagName.toLowerCase()) || tagName.startsWith("!--")) {
                                return
                            } else {
                                var closingTag = "</" + tagName + ">";
                            }
                            comp.value = text.substring(0, cursorPos) + closingTag + text.substring(cursorPos);
                            comp.selectionStart = comp.selectionEnd = cursorPos;
                        }
                    }
                }
            }
            
            comp.addEventListener("input", update);
            comp.addEventListener("input", handleAutoClose);
            comp.addEventListener("keydown", function(event) {
                if (event.key === "Tab") {
                    event.preventDefault();
                    var start = this.selectionStart;
                    var end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 4;
                }
            });
            comp.addEventListener("keydown", function(event) {
                var pairs = {
                    '"': '"',
                    "'": "'",
                    "(": ")"
                };
                if (pairs[event.key] !== undefined) {
                    event.preventDefault();
                    var start = this.selectionStart;
                    var end = this.selectionEnd;
                    var text = this.value;
            
                    var openChar = event.key;
                    var closeChar = pairs[event.key];
                    this.value = text.substring(0, start) + openChar + closeChar + text.substring(end);
                    this.selectionStart = this.selectionEnd = start + 1;
                }
            });
            update();
        </script>
    </body>
</html>
